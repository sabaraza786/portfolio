<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <style>
      .bg{fill:#0f172a}
      .card{fill:#0b1220;opacity:0.75}
      .muted{fill:#94a3b8}
      .accent{fill:url(#g1)}
      .text{fill:#e6eef8;font-family:Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial}
    </style>
  </defs>
  <rect width="1200" height="700" class="bg" rx="16"/>

  <!-- Header -->
  <rect x="32" y="28" width="1136" height="72" rx="10" fill="#071033"/>
  <circle cx="74" cy="64" r="18" fill="white" opacity="0.06"/>
  <rect x="110" y="48" width="220" height="24" rx="6" fill="#071033"/>

  <!-- Left column cards -->
  <rect x="32" y="120" width="380" height="520" rx="12" class="card"/>
  <rect x="436" y="120" width="728" height="248" rx="12" class="card"/>
  <rect x="436" y="388" width="356" height="252" rx="12" class="card"/>
  <rect x="806" y="388" width="358" height="252" rx="12" class="card"/>

  <!-- Stats inside left card -->
  <g transform="translate(56,150)">
    <rect x="0" y="0" width="308" height="44" rx="8" fill="#071033"/>
    <text x="16" y="30" class="text" font-size="16" font-weight="600">Leads</text>
    <text x="230" y="30" class="text" font-size="18" font-weight="700">1,254</text>

    <rect x="0" y="68" width="308" height="44" rx="8" fill="#071033"/>
    <text x="16" y="92" class="text" font-size="16">Contacts</text>
    <text x="230" y="92" class="text" font-size="18" font-weight="700">672</text>

    <rect x="0" y="136" width="308" height="120" rx="8" fill="#071033"/>
    <text x="16" y="164" class="text" font-size="14">Pipeline</text>
  </g>

  <!-- Chart area (right top) -->
  <g transform="translate(460,140)">
    <rect x="0" y="0" width="680" height="36" rx="6" fill="#071033"/>
    <text x="12" y="24" class="text" font-size="14">Conversion Rate</text>
    <rect x="0" y="48" width="680" height="140" rx="6" fill="#071033"/>

    <!-- small bars -->
    <g transform="translate(16,72)">
      <rect x="0" y="40" width="36" height="24" rx="6" fill="#123" opacity="0.6"/>
      <rect x="56" y="24" width="36" height="40" rx="6" fill="url(#g1)"/>
      <rect x="112" y="8" width="36" height="56" rx="6" fill="#1e293b" opacity="0.7"/>
      <rect x="168" y="24" width="36" height="40" rx="6" fill="#0ea5a4" opacity="0.9"/>
      <rect x="224" y="32" width="36" height="32" rx="6" fill="#1e293b" opacity="0.5"/>
      <rect x="280" y="16" width="36" height="48" rx="6" fill="#7c3aed" opacity="0.85"/>
    </g>
  </g>

  <!-- Right bottom cards small items -->
  <g transform="translate(820,404)">
    <rect x="16" y="16" width="148" height="36" rx="8" fill="#071033"/>
    <text x="32" y="40" class="text" font-size="12">Monthly Revenue</text>
    <text x="110" y="40" class="text" font-size="12" font-weight="700">$24.6k</text>

    <rect x="186" y="16" width="148" height="36" rx="8" fill="#071033"/>
    <text x="202" y="40" class="text" font-size="12">Open Tasks</text>
    <text x="324" y="40" class="text" font-size="12" font-weight="700">46</text>
  </g>

  <!-- Title -->
  <text x="56" y="96" class="text" font-size="20" font-weight="700">AI CRM Dashboard</text>

  <!-- Small accent circle -->
  <circle cx="1060" cy="96" r="28" class="accent" opacity="0.95" />

</svg>
